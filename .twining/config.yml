version: 1
project_name: .
embedding_model: all-MiniLM-L6-v2
archive:
  auto_archive_on_commit: true
  auto_archive_on_context_switch: true
  max_blackboard_entries_before_archive: 500
context_assembly:
  default_max_tokens: 4000
  priority_weights:
    recency: 0.2
    relevance: 0.2
    decision_confidence: 0.15
    warning_boost: 0.1
    graph_reachability: 0.35
conflict_resolution: human
agents:
  liveness:
    idle_after_ms: 300000
    gone_after_ms: 1800000
delegations:
  timeouts:
    high_ms: 300000
    normal_ms: 1800000
    low_ms: 14400000
analytics:
  metrics:
    enabled: true
  telemetry:
    enabled: false
    posthog_api_key: ''
    posthog_host: https://us.i.posthog.com
instructions:
  auto_inject: true
tools:
  mode: full
  full_surface: false
graph:
  auto_populate: false
